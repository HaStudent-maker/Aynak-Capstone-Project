<!DOCTYPE html>
<html>
<head>
    <title>Rewards</title>
    <style>
        body { font-family: Arial; background:#f4f4f4; margin:0; padding:20px;}
        .reward-container { display:flex; flex-wrap:wrap; gap:20px;}
        .card {
            background:white;
            padding:15px;
            width:250px;
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,0.1);
        }
        .card h3 { margin:0 0 10px 0; }
        .points { color:green; font-weight:bold; }
        button {
            padding:8px 12px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<h2>Available Rewards</h2>

<div class="reward-container" id="rewards"></div>

<script>
    fetch('/api/user/rewards')
        .then(response => {
            if (!response.ok) {
                throw new Error("Not authorized");
            }
            return response.json();
        })
        .then(data => {
            const container = document.getElementById('rewards');
            data.forEach(reward => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${reward.name}</h3>
                    <p>${reward.description}</p>
                    <p class="points">${reward.pointsRequired} Points</p>
                    <button onclick="redeem(${reward.id})">Redeem</button>
                `;
                container.appendChild(card);
            });
        })
        .catch(error => {
            alert("You must login as User to view rewards.");
        });

    function redeem(id) {
        fetch(`/api/user/rewards/${id}/redeem`, {
            method: 'POST'
        })
        .then(res => res.text())
        .then(msg => alert(msg))
        .catch(err => alert("Error redeeming reward"));
    }
</script>

</body>
</html>
