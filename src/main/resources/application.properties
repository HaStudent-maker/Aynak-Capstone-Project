spring.application.name=Capstone_Project_Aynak
server.port=8090

# Keycloak OAuth2 Login
spring.security.oauth2.client.registration.keycloak.client-id=${CLIENTID}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.client-secret=${SECRET}
spring.security.oauth2.client.registration.keycloak.redirect-uri=http://localhost:8090/login/oauth2/code/keycloak
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8080/realms/Aynak

# Keycloak JWT Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/Aynak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

# JWT Role Converter
jwt.auth.converter.resource-id=${CLIENTID}
jwt.auth.converter.principal-attribute=preferred_username

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/Capstone_Aynak?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# AWS S3
aws.s3.bucket-name=${S3_BUCKET_NAME}
aws.s3.region=${AWS_REGION}

# Logging
logging.level.org.springframework.security=DEBUG
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB